[discord]
# The Discord bot token, can also be set from env variable DISCORD_TOKEN
token = "YOUR_DISCORD_BOT_TOKEN"

# Optional: List of users to always reply to without explicit mention (usernames or user IDs)
# always_reply = ["user1", "user2"]

[gemini]
# Optional: API keys and cloud settings. The Gemini CLI will also respect standard environment variables.
# api_key = "YOUR_GOOGLE_API_KEY"
# project = "YOUR_GOOGLE_CLOUD_PROJECT"
# location = "YOUR_GOOGLE_CLOUD_LOCATION"

# Optional: The path to the Gemini CLI executable. If not provided, it will be searched in PATH.
# executable_path = "/usr/local/bin/gemini"

# Optional: Maximum time in seconds to wait for Gemini to respond (default: 600)
# timeout = 600

# The path to the workspace directory to run the Gemini agent in
workspace = "workspace"

# Optional: A list of additional directories to include in the workspace
# This is useful for including directories that are not in the workspace, 
# but you want the agent to have access to.
# include_directories = ["/path/to/your/notes", "/path/to/your/projects"]

# Whether to run the agent in a sandboxed environment (true/false)
sandbox = false
 
# Whether to always run Gemini with YOLO mode enabled (-y) (true/false)
# yolo = false

# Optional: The home directory for the Gemini CLI configuration and session data
# cli_home = "/path/to/.config/gemini"
 
# Optional: The directory to save attachments to (relative to workspace or absolute).
# Defaults to "attachments" inside the workspace.
# attachments_dir = "attachments"

# Optional: A list of policy configuration files to forcefully inject into every Gemini CLI execution
# policy = ["my_policy1.yaml", "my_policy2.yaml"]

# [prompt]
# The paths to the markdown files used for prompt customization (relative to workspace or absolute)
# add your own user prompts here
# user = ["user.md"]

# [[cronjob]]
# schedule = "10 13 * * *"
# prompt = "cronjobs/test.md"
# channel_id = "channel id"
# mention_user_id = "your user id"
# silent = false